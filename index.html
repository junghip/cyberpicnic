<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        if (!location.hostname.endsWith("github.io")) {
          return;
        }

        var segments = location.pathname.split("/").filter(Boolean);
        if (!segments.length) {
          return;
        }

        var baseHref = "/" + segments[0] + "/";
        if (location.pathname === "/" + segments[0] || location.pathname.indexOf(baseHref) === 0) {
          var baseElement = document.createElement("base");
          baseElement.href = baseHref;
          document.head.insertBefore(baseElement, document.head.firstChild);
        }
      })();
    </script>
    <title>cyberBAB 시작하기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone onboarding-screen" aria-label="계정 시작 화면">
      <header class="status-bar" aria-hidden="true">
        <span class="status-bar__time">9:41</span>
        <div class="status-bar__icons">
          <span class="status-bar__signal"></span>
          <span class="status-bar__wifi"></span>
          <span class="status-bar__battery"></span>
        </div>
      </header>

      <section class="onboarding-panel">
        <p class="onboarding-panel__eyebrow">cyberBAB</p>
        <h1 class="onboarding-panel__title" id="onboarding-title">계정을 만들어 주세요</h1>
        <p class="onboarding-panel__description" id="onboarding-description">
          닉네임과 비밀번호로 로그인하면 다른 기기에서도 같은 계정으로 이어갈 수 있습니다.
        </p>

        <div class="onboarding-tabs" role="tablist" aria-label="계정 방식 선택">
          <button class="onboarding-tabs__button is-active" type="button" role="tab" aria-selected="true" data-auth-mode="signup">
            처음이에요
          </button>
          <button class="onboarding-tabs__button" type="button" role="tab" aria-selected="false" data-auth-mode="login">
            로그인
          </button>
        </div>

        <form class="onboarding-form" id="nickname-form">
          <label class="onboarding-form__label" for="nickname-input">닉네임</label>
          <input
            class="onboarding-form__input"
            id="nickname-input"
            name="nickname"
            type="text"
            maxlength="12"
            placeholder="예: cyber하은"
            autocomplete="username"
            required
          />

          <label class="onboarding-form__label" for="password-input">비밀번호</label>
          <input
            class="onboarding-form__input"
            id="password-input"
            name="password"
            type="password"
            minlength="4"
            maxlength="64"
            placeholder="4자 이상"
            autocomplete="new-password"
            required
          />

          <label class="onboarding-form__label" for="password-confirm-input" id="password-confirm-label">비밀번호 확인</label>
          <input
            class="onboarding-form__input"
            id="password-confirm-input"
            name="passwordConfirm"
            type="password"
            minlength="4"
            maxlength="64"
            placeholder="비밀번호 다시 입력"
            autocomplete="new-password"
            required
          />

          <p class="onboarding-form__error" id="nickname-error" hidden></p>
          <button class="onboarding-form__submit" type="submit" id="onboarding-submit-button">계정 만들고 입장하기</button>
        </form>
      </section>

      <div class="home-indicator" aria-hidden="true"></div>
    </main>

    <script src="supabase-config.js"></script>
    <script type="module" src="onboarding.js"></script>
  </body>
</html>
