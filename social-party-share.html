<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        if (!location.hostname.endsWith("github.io")) {
          return;
        }

        var segments = location.pathname.split("/").filter(Boolean);
        if (!segments.length) {
          return;
        }

        var baseHref = "/" + segments[0] + "/";
        if (location.pathname === "/" + segments[0] || location.pathname.indexOf(baseHref) === 0) {
          var baseElement = document.createElement("base");
          baseElement.href = baseHref;
          document.head.insertBefore(baseElement, document.head.firstChild);
        }
      })();
    </script>
    <title>cyberBAB 파티 생성하기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone party-share-screen" aria-label="파티 생성 완료 화면">
      <header class="status-bar" aria-hidden="true">
        <span class="status-bar__time">9:41</span>
        <div class="status-bar__icons">
          <span class="status-bar__signal"></span>
          <span class="status-bar__wifi"></span>
          <span class="status-bar__battery"></span>
        </div>
      </header>

      <header class="party-create-header">
        <button class="party-create-header__back" type="button" id="back-to-social-button" aria-label="소셜로 돌아가기">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M15 6L9 12L15 18"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <h1 class="party-create-header__title">파티 생성하기</h1>
        <span class="party-create-header__spacer" aria-hidden="true"></span>
      </header>

      <section class="party-share-content">
        <div class="party-share-locations" aria-hidden="true">
          <div class="party-share-locations__tile" data-location-id="1"></div>
          <div class="party-share-locations__tile" data-location-id="2"></div>
          <div class="party-share-locations__tile" data-location-id="3"></div>
          <div class="party-share-locations__tile" data-location-id="4"></div>
        </div>

        <h2 class="party-share-message" id="share-party-message"></h2>

        <div class="party-share-code">
          <p class="party-share-code__value" id="share-party-code" aria-live="polite"></p>
          <button class="party-share-code__copy" type="button" data-copy-party-code>복사</button>
        </div>

        <p class="party-share-content__feedback" id="share-party-feedback" hidden></p>

        <button class="party-share-cta" type="button" data-enter-shared-party id="share-party-enter-button"></button>
      </section>

      <div class="home-indicator" aria-hidden="true"></div>
    </main>

    <script src="supabase-config.js"></script>
    <script type="module" src="social-party-share.js"></script>
  </body>
</html>
