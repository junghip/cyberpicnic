<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cyberBAB 홈</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone" aria-label="홈 화면">
      <header class="status-bar" aria-hidden="true">
        <span class="status-bar__time">9:41</span>
        <div class="status-bar__icons">
          <span class="status-bar__signal"></span>
          <span class="status-bar__wifi"></span>
          <span class="status-bar__battery"></span>
        </div>
      </header>

      <section class="top-bar">
        <div class="tab-switch" role="tablist" aria-label="메인 탭">
          <button
            class="tab-switch__button is-active"
            type="button"
            role="tab"
            aria-selected="true"
            data-nav-tab="home"
          >
            홈
          </button>
          <button
            class="tab-switch__button"
            type="button"
            role="tab"
            aria-selected="false"
            data-nav-tab="social"
          >
            소셜
          </button>
        </div>
        <button class="profile-button profile-button--filled" type="button" id="profile-button" aria-label="프로필"></button>
      </section>

      <section class="home-grid" aria-label="홈 콘텐츠">
        <button class="home-card home-card--empty" type="button" aria-label="홈 카드 1"></button>
        <button class="home-card home-card--empty" type="button" aria-label="홈 카드 2"></button>
        <button class="home-card home-card--empty" type="button" aria-label="홈 카드 3"></button>
        <button class="home-card home-card--empty" type="button" aria-label="홈 카드 4"></button>
      </section>

      <div class="home-indicator" aria-hidden="true"></div>
    </main>

    <script type="module" src="home.js"></script>
  </body>
</html>
